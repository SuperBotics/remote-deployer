name: Deploy Build Artifact

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build artifact
        run: zip -r release.zip dist
      - name: Deploy to remote deployment utility
        run: |
          curl -X POST "$REMOTE_DEPLOYMENT_URL/deploy" \
            -H "x-deployment-key: $REMOTE_DEPLOYMENT_KEY" \
            -F "path=$REMOTE_DEPLOYMENT_PATH" \
            -F "file=@release.zip"
        env:
          REMOTE_DEPLOYMENT_URL: ${{ secrets.REMOTE_DEPLOYMENT_URL }}
          REMOTE_DEPLOYMENT_KEY: ${{ secrets.REMOTE_DEPLOYMENT_KEY }}
          REMOTE_DEPLOYMENT_PATH: ${{ secrets.REMOTE_DEPLOYMENT_PATH }}
